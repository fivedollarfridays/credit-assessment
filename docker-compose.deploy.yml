# Blue/green deployment overlay for docker-compose.
# Usage: docker compose -f docker-compose.yml -f docker-compose.deploy.yml up
services:
  api-blue:
    build:
      context: .
      target: production
    volumes: []
    ports:
      - "8001:8000"
    environment:
      - ENVIRONMENT=production
      - API_KEY=${API_KEY:-}
      - CORS_ORIGINS=${CORS_ORIGINS:-["http://localhost:3000"]}
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
      - DATABASE_URL=${DATABASE_URL:?DATABASE_URL must be set}
      - DEPLOY_SLOT=blue
      - FORWARDED_ALLOW_IPS=${FORWARDED_ALLOW_IPS:?FORWARDED_ALLOW_IPS must be set}
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 5s
      timeout: 3s
      retries: 5
      start_period: 10s
    restart: unless-stopped

  api-green:
    build:
      context: .
      target: production
    volumes: []
    ports:
      - "8002:8000"
    environment:
      - ENVIRONMENT=production
      - API_KEY=${API_KEY:-}
      - CORS_ORIGINS=${CORS_ORIGINS:-["http://localhost:3000"]}
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
      - DATABASE_URL=${DATABASE_URL:?DATABASE_URL must be set}
      - DEPLOY_SLOT=green
      - FORWARDED_ALLOW_IPS=${FORWARDED_ALLOW_IPS:?FORWARDED_ALLOW_IPS must be set}
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 5s
      timeout: 3s
      retries: 5
      start_period: 10s
    restart: unless-stopped
