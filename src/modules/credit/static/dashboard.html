<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Credit Assessment — Admin Dashboard</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: system-ui, -apple-system, sans-serif; background: #f5f7fa; color: #1a1a2e; }
  .header { background: #1a1a2e; color: #fff; padding: 1rem 2rem; display: flex; justify-content: space-between; align-items: center; }
  .header h1 { font-size: 1.25rem; font-weight: 600; }
  .header .status { font-size: 0.85rem; opacity: 0.8; }
  .container { max-width: 1200px; margin: 2rem auto; padding: 0 1.5rem; }
  .cards { display: grid; grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); gap: 1.25rem; margin-bottom: 2rem; }
  .card { background: #fff; border-radius: 8px; padding: 1.5rem; box-shadow: 0 1px 3px rgba(0,0,0,.08); }
  .card .label { font-size: 0.8rem; text-transform: uppercase; letter-spacing: .05em; color: #666; margin-bottom: 0.5rem; }
  .card .value { font-size: 2rem; font-weight: 700; }
  .section { background: #fff; border-radius: 8px; padding: 1.5rem; box-shadow: 0 1px 3px rgba(0,0,0,.08); margin-bottom: 1.5rem; }
  .section h2 { font-size: 1.1rem; margin-bottom: 1rem; border-bottom: 1px solid #eee; padding-bottom: 0.5rem; }
  table { width: 100%; border-collapse: collapse; font-size: 0.9rem; }
  th, td { text-align: left; padding: 0.6rem 0.75rem; border-bottom: 1px solid #eee; }
  th { font-weight: 600; color: #555; font-size: 0.8rem; text-transform: uppercase; }
  .badge { display: inline-block; padding: 2px 8px; border-radius: 4px; font-size: 0.75rem; font-weight: 600; }
  .badge-active { background: #d4edda; color: #155724; }
  .badge-inactive { background: #f8d7da; color: #721c24; }
  .badge-plan { background: #d1ecf1; color: #0c5460; }
  .health-row { display: flex; justify-content: space-between; padding: 0.5rem 0; border-bottom: 1px solid #f0f0f0; }
  .health-row:last-child { border: none; }
  .btn { padding: 0.3rem 0.75rem; border: none; border-radius: 4px; cursor: pointer; font-size: 0.8rem; }
  .btn-danger { background: #dc3545; color: #fff; }
  .btn-danger:hover { background: #c82333; }
  #login-form { max-width: 400px; margin: 4rem auto; }
  #login-form input { width: 100%; padding: 0.6rem; margin-bottom: 0.75rem; border: 1px solid #ccc; border-radius: 4px; }
  #login-form button { width: 100%; padding: 0.7rem; background: #1a1a2e; color: #fff; border: none; border-radius: 4px; cursor: pointer; }
  .hidden { display: none; }
  @media (max-width: 768px) { .cards { grid-template-columns: 1fr 1fr; } }
</style>
</head>
<body>

<div id="login-section">
  <div class="header"><h1>Admin Dashboard</h1></div>
  <div class="container">
    <div id="login-form" class="section">
      <h2>Sign In</h2>
      <input id="username" placeholder="Username" type="text">
      <input id="password" placeholder="Password" type="password">
      <button onclick="login()">Sign In</button>
      <p id="login-error" style="color:red;margin-top:0.5rem;font-size:0.85rem"></p>
    </div>
  </div>
</div>

<div id="dashboard-section" class="hidden">
  <div class="header">
    <h1>Credit Assessment — Admin Dashboard</h1>
    <span class="status" id="refresh-status">Loading...</span>
  </div>
  <div class="container">
    <div class="cards">
      <div class="card"><div class="label">Total Users</div><div class="value" id="stat-users">—</div></div>
      <div class="card"><div class="label">Assessments</div><div class="value" id="stat-assessments">—</div></div>
      <div class="card"><div class="label">Active Subscriptions</div><div class="value" id="stat-subs">—</div></div>
      <div class="card"><div class="label">System Status</div><div class="value" id="stat-health">—</div></div>
    </div>

    <div class="section">
      <h2>Customers</h2>
      <table>
        <thead><tr><th>Email</th><th>Role</th><th>Plan</th><th>Assessments</th><th>Status</th><th>Actions</th></tr></thead>
        <tbody id="customer-table"></tbody>
      </table>
    </div>

    <div class="section">
      <h2>System Health</h2>
      <div id="health-details"></div>
    </div>
  </div>
</div>

<script>
let TOKEN = '';
const BASE = window.location.origin;

async function api(path, opts = {}) {
  const res = await fetch(BASE + path, {
    ...opts,
    headers: { 'Authorization': 'Bearer ' + TOKEN, 'Content-Type': 'application/json', ...(opts.headers || {}) }
  });
  if (!res.ok) throw new Error(res.status);
  return res.json();
}

async function login() {
  const u = document.getElementById('username').value;
  const p = document.getElementById('password').value;
  try {
    const data = await fetch(BASE + '/v1/auth/token', {
      method: 'POST', headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ username: u, password: p })
    }).then(r => { if (!r.ok) throw new Error(r.status); return r.json(); });
    TOKEN = data.access_token;
    document.getElementById('login-section').classList.add('hidden');
    document.getElementById('dashboard-section').classList.remove('hidden');
    refresh();
  } catch (e) {
    document.getElementById('login-error').textContent = 'Invalid credentials';
  }
}

async function refresh() {
  try {
    const [overview, customers, health] = await Promise.all([
      api('/v1/dashboard/overview'),
      api('/v1/dashboard/customers'),
      api('/v1/dashboard/health'),
    ]);
    document.getElementById('stat-users').textContent = overview.total_users;
    document.getElementById('stat-assessments').textContent = overview.total_assessments;
    document.getElementById('stat-subs').textContent = overview.active_subscriptions;
    document.getElementById('stat-health').textContent = health.status.toUpperCase();

    const tbody = document.getElementById('customer-table');
    tbody.textContent = '';
    customers.forEach(c => {
      const tr = document.createElement('tr');
      const tdEmail = document.createElement('td'); tdEmail.textContent = c.email;
      const tdRole = document.createElement('td'); tdRole.textContent = c.role;
      const tdPlan = document.createElement('td');
      if (c.plan) { const badge = document.createElement('span'); badge.className = 'badge badge-plan'; badge.textContent = c.plan; tdPlan.appendChild(badge); } else { tdPlan.textContent = '\u2014'; }
      const tdCount = document.createElement('td'); tdCount.textContent = c.assessment_count;
      const tdStatus = document.createElement('td');
      const statusBadge = document.createElement('span');
      statusBadge.className = 'badge ' + (c.is_active ? 'badge-active' : 'badge-inactive');
      statusBadge.textContent = c.is_active ? 'Active' : 'Inactive';
      tdStatus.appendChild(statusBadge);
      const tdAction = document.createElement('td');
      if (c.is_active) { const btn = document.createElement('button'); btn.className = 'btn btn-danger'; btn.textContent = 'Revoke'; btn.addEventListener('click', () => deactivate(c.email)); tdAction.appendChild(btn); }
      tr.append(tdEmail, tdRole, tdPlan, tdCount, tdStatus, tdAction);
      tbody.appendChild(tr);
    });

    const hd = document.getElementById('health-details');
    hd.textContent = '';
    Object.entries(health).forEach(([k, v]) => {
      const row = document.createElement('div'); row.className = 'health-row';
      const label = document.createElement('span'); label.textContent = k;
      const val = document.createElement('strong'); val.textContent = v;
      row.append(label, val);
      hd.appendChild(row);
    });

    document.getElementById('refresh-status').textContent = 'Updated ' + new Date().toLocaleTimeString();
  } catch (e) {
    document.getElementById('refresh-status').textContent = 'Error loading data';
  }
}

async function deactivate(email) {
  if (!confirm('Deactivate ' + email + '?')) return;
  await api('/v1/dashboard/customers/' + encodeURIComponent(email), { method: 'DELETE' });
  refresh();
}

setInterval(refresh, 30000);
</script>
</body>
</html>
