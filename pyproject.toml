[project]
name = "credit-assessment"
version = "0.1.0"
requires-python = ">=3.10"
dependencies = [
    "pydantic>=2.0",
    "fastapi>=0.110",
    "uvicorn>=0.25",
]

[project.optional-dependencies]
dev = [
    "pytest>=8.0",
    "pytest-cov>=5.0",
    "httpx>=0.27",
]

[tool.pytest.ini_options]
testpaths = ["src"]
pythonpath = ["src"]

[tool.coverage.run]
source = ["src/modules/credit"]
omit = ["*/tests/*"]

[tool.coverage.report]
fail_under = 100
show_missing = true
